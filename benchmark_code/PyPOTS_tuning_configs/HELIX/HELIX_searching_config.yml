experimentName: HELIX hyper-param searching
authorName: MiBah Cat
trialConcurrency: 1
trainingServicePlatform: local
searchSpacePath: HELIX_PhysioNet2012_tuning_space.json
multiThread: true
useAnnotation: false
tuner:
    builtinTunerName: Random

trial:
    command: enable_tuning=1 pypots-cli tuning --model pypots.imputation.HELIX --train_set ../../data/physionet_2012/train.h5 --val_set ../../data/physionet_2012/val.h5
    codeDir: .
    gpuNum: 1

localConfig:
    useActiveGpu: true
    maxTrialNumPerGpu: 20
    gpuIndices: 0